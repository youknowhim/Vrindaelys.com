<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Soon | Vrindaelys</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #030303; 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
        }

        /* Massive Ambient Glow */
        .glow-orb {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(92, 124, 250, 0.4) 0%, rgba(250, 82, 82, 0.2) 40%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 2; /* Move above the canvas */
            pointer-events: none;
            animation: pulseOrb 8s infinite alternate ease-in-out;
            filter: blur(80px);
            mix-blend-mode: screen; /* Makes it pop brilliantly over black */
        }
        @keyframes pulseOrb {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        /* Canvas Background */
        #bgCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.85;
        }

        /* Custom Cursor */
        #cursorCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
        }

        /* Content Container */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* Logo */
        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.2, 1, 0.3, 1) 0.5s forwards;
            color: #a6b1fa;
            text-shadow: 0 0 20px rgba(166, 177, 250, 0.4);
            margin-bottom: 1rem;
        }

        /* Main Title with Mask Reveal */
        .title-mask {
            overflow: hidden;
            display: block;
            padding-bottom: 10px;
            margin-top: -10px;
        }
        .title {
            font-size: clamp(3.5rem, 9vw, 8rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ffffff 0%, #a6b1fa 40%, #fca4d0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateY(110%);
            animation: slideUp 1.2s cubic-bezier(0.19, 1, 0.22, 1) 0.8s forwards;
            position: relative;
        }
        
        .title::after {
            content: attr(data-text);
            position: absolute;
            left: 0; top: 0;
            z-index: -1;
            background: inherit;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: blur(24px);
            opacity: 0.6;
        }

        /* Subtitle */
        .subtitle {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: rgba(255, 255, 255, 0.7);
            max-width: 540px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.2, 1, 0.3, 1) 1.2s forwards;
            line-height: 1.6;
            margin-top: 1rem;
        }

        /* Contact Button */
        .contact-btn {
            margin-top: 2.5rem;
            padding: 16px 40px;
            background: rgba(166, 177, 250, 0.05);
            color: #fff;
            border: 1px solid rgba(166, 177, 250, 0.3);
            border-radius: 100px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.2, 1, 0.3, 1) 1.5s forwards;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(59, 76, 192, 0.1), inset 0 0 10px rgba(166, 177, 250, 0.05);
        }
        .contact-btn:hover {
            background: rgba(166, 177, 250, 0.15);
            border-color: #a6b1fa;
            box-shadow: 0 0 40px rgba(166, 177, 250, 0.4), inset 0 0 20px rgba(166, 177, 250, 0.2);
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.8);
            transform: scale(1.05) translateY(-2px);
        }

        @keyframes slideUp {
            to { transform: translateY(0); }
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Minimal Noise Overlay */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0.04;
            background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');
        }
    </style>
</head>
<body>
    <div class="glow-orb"></div>
    <div class="noise"></div>
    <canvas id="bgCanvas"></canvas>
    <canvas id="cursorCanvas"></canvas>

    <div class="content">
        <div class="logo">Vrindaelys</div>
        
        <div class="title-mask">
            <h1 class="title" data-text="Launching">Launching</h1>
        </div>
        <div class="title-mask">
            <h1 class="title" data-text="Soon.">Soon.</h1>
        </div>
        
        <p class="subtitle">We are currently engineering the next generation of digital infrastructure. Enter your email to be notified.</p>
        
        <a href="mailto:hello@vrindaelys.com" class="contact-btn" data-hover>Contact Us</a>
    </div>

    <script>
        // =============================================
        // BACKGROUND VORTEX FX
        // =============================================
        const cvs = document.getElementById('bgCanvas');
        const ctx = cvs.getContext('2d');
        let W, H;
        
        function resize() {
            W = cvs.width = window.innerWidth;
            H = cvs.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const colors = ['rgba(166, 177, 250, ', 'rgba(252, 164, 208, ', 'rgba(255, 255, 255, '];
        const particles = [];
        for(let i=0; i<180; i++) {
            particles.push({
                x: Math.random() * W,
                y: Math.random() * H,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 0.8 + 0.2,
                angle: Math.random() * Math.PI * 2,
                dist: Math.random() * Math.max(W, H),
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        let mouseX = W/2, mouseY = H/2;
        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function renderBg() {
            // Create trailing effect
            ctx.fillStyle = 'rgba(3, 3, 3, 0.15)';
            ctx.fillRect(0, 0, W, H);
            
            const centerX = W/2;
            const centerY = H/2;

            particles.forEach(p => {
                p.angle += p.speed * 0.015;
                p.dist -= p.speed * 0.7;
                if(p.dist < 5) {
                    p.dist = Math.max(W, H) * 1.2;
                    p.angle = Math.random() * Math.PI * 2;
                }
                
                // Mouse influence creates a gravity well
                const dx = mouseX - centerX;
                const dy = mouseY - centerY;
                
                const x = centerX + Math.cos(p.angle) * p.dist + dx * 0.08;
                const y = centerY + Math.sin(p.angle) * p.dist + dy * 0.08;
                
                ctx.beginPath();
                ctx.arc(x, y, p.size, 0, Math.PI*2);
                ctx.fillStyle = p.color + (1 - p.dist/Math.max(W,H)) + ')';
                ctx.fill();
            });
            requestAnimationFrame(renderBg);
        }
        renderBg();

        // =============================================
        // CURSOR COMET TRAIL
        // =============================================
        const cCvs = document.getElementById('cursorCanvas');
        const cCtx = cCvs.getContext('2d');
        function cResize() { cCvs.width = window.innerWidth; cCvs.height = window.innerHeight; }
        window.addEventListener('resize', cResize);
        cResize();

        const trail = [];
        let sMX = mouseX, sMY = mouseY;
        let isHover = false;

        document.querySelectorAll('[data-hover]').forEach(el => {
            el.addEventListener('mouseenter', () => isHover = true);
            el.addEventListener('mouseleave', () => isHover = false);
        });

        function renderCursor() {
            sMX += (mouseX - sMX) * 0.35;
            sMY += (mouseY - sMY) * 0.35;
            
            trail.unshift({x: sMX, y: sMY});
            if(trail.length > 25) trail.pop();

            cCtx.clearRect(0, 0, W, H);

            for(let i=0; i<trail.length; i++) {
                const p = trail[i];
                const prog = i / trail.length;
                let size = 6 * (1 - prog * 0.8);
                let alpha = 0.6 * (1 - prog);

                if(isHover && i === 0) { size = 30; alpha = 0.9; }

                // Glow
                const glow = cCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size * 4);
                glow.addColorStop(0, `rgba(166, 177, 250, ${alpha * 0.3})`);
                glow.addColorStop(1, 'rgba(252, 164, 208, 0)');
                cCtx.beginPath();
                cCtx.arc(p.x, p.y, size*4, 0, Math.PI*2);
                cCtx.fillStyle = glow;
                cCtx.fill();

                // Core
                cCtx.beginPath();
                cCtx.arc(p.x, p.y, size, 0, Math.PI*2);
                cCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                cCtx.fill();
            }
            requestAnimationFrame(renderCursor);
        }
        renderCursor();
    </script>
</body>
</html>
